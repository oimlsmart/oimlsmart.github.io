# Lychee link checker configuration
# https://lychee.link.cli.rs/

# Accept 200..399 status codes as valid (including redirects)
accept = ["100", "200", "201", "202", "203", "204", "206", "207", "301", "302", "303", "304", "307", "308"]

# Exclude these patterns from checking (no noise from internal links
# or known-good external URLs with aggressive redirect chains)
exclude = [
  "localhost",
  "127.0.0.1",
  "https://www.oiml.org",
  # Cross-app nav targets — these routes are served by the smart repo's
  # browser app, not this static marketing/docs site. They live behind
  # authentication and are not deployable from here. See CLAUDE.md.
  "/vocab",
  "/vocab/",
  "/resolutions",
  "/resolutions/",
  "/concepts-management",
  "/concepts-management/",
  # Source repo is private during the pilot — link is for reference, not public.
  "https://github.com/oimlsmart/smart",
]

# Don't check mailto links
include_mail = false

# Maximum number of retries before a link is reported as failed
max_retries = 2

# Number of threads to use
max_concurrency = 16

# Request timeout (seconds)
timeout = 20

# User agent to send
user_agent = "oimlsmart-link-checker"

# Cache results
cache = true

# Max cache age (days)
max_cache_age = "1d"