# Lychee link checker configuration
# https://lychee.link.cli.rs/

# Accept 200..399 status codes as valid (including redirects)
accept = ["100", "200", "201", "202", "203", "204", "206", "207", "301", "302", "303", "304", "307", "308"]

# Exclude these patterns from checking.
#
# NOTE: we do NOT set `base_url` here. Doing so makes lychee resolve every
# absolute path against the live site, which 404s on the build-specific
# hashed assets under `/_astro/*` (their hashes change per build).
# Instead, sibling-Pages-site URLs (/vocab/, /resolutions/) are excluded
# from the local-build check and verified separately against the live
# site by the `live-sibling-pages` step in `.github/workflows/links.yml`.
exclude = [
  "localhost",
  "127.0.0.1",
  "https://www.oiml.org",
  # Sibling GitHub Pages sites on the same domain — checked live by CI.
  "/vocab",
  "/vocab/",
  "/resolutions",
  "/resolutions/",
  # Cross-app nav target — served by the smart repo's authenticated
  # browser app, not deployable from here.
  "/concepts-management",
  "/concepts-management/",
  # Source repo is private during the pilot — link is for reference, not public.
  "https://github.com/oimlsmart/smart",
]

# Don't check mailto links
include_mail = false

# Maximum number of retries before a link is reported as failed
max_retries = 2

# Number of threads to use
max_concurrency = 16

# Request timeout (seconds)
timeout = 20

# User agent to send
user_agent = "oimlsmart-link-checker"

# Cache results
cache = true

# Max cache age (days)
max_cache_age = "1d"